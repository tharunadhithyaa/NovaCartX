<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or register for a NovaCartX account. Access your orders, wishlist, and exclusive deals.">
  <title>Login / Register — NovaCartX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loader">
  <div class="loader-logo">Nova<span>Cart</span>X</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>
<div id="toast-container"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Nova<span>Cart</span>X</a>
    <div class="nav-search">
      <span class="nav-search-icon">🔍</span>
      <input type="text" id="nav-search" placeholder="Search products, brands…">
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="nav-btn" id="theme-toggle" title="Toggle theme">🌙</button>
      <a href="login.html" class="nav-btn active" title="Account">👤</a>
      <a href="cart.html" class="nav-btn" title="Cart" style="position:relative;">
        🛒 <span class="nav-badge cart-badge">0</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">🏠 Home</a>
  <a href="products.html">🛍 Products</a>
  <a href="cart.html">🛒 Cart</a>
  <a href="login.html">👤 Account</a>
  <a href="about.html">ℹ️ About</a>
  <a href="contact.html">📬 Contact</a>
</div>
<button id="back-to-top" title="Back to top">↑</button>

<!-- Auth Page -->
<main class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">Nova<span>Cart</span>X</div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="login-form">Login</button>
        <button class="auth-tab" data-form="register-form">Register</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form">
        <div class="social-login">
          <button type="button" class="social-login-btn">🔵 Google</button>
          <button type="button" class="social-login-btn">⚫ Apple</button>
        </div>
        <div class="auth-divider">or</div>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" class="form-control" id="login-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <div class="pass-toggle-wrap">
            <input type="password" class="form-control" id="login-pass" name="password" placeholder="••••••••" required>
            <button type="button" class="pass-toggle">👁</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
          <label class="form-check"><input type="checkbox"> Remember me</label>
          <a href="#" style="font-size:0.85rem;color:var(--accent);font-weight:500;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Login</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form">
        <div class="social-login">
          <button type="button" class="social-login-btn">🔵 Google</button>
          <button type="button" class="social-login-btn">⚫ Apple</button>
        </div>
        <div class="auth-divider">or</div>
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input type="text" class="form-control" id="reg-name" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input type="email" class="form-control" id="reg-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Password</label>
          <div class="pass-toggle-wrap">
            <input type="password" class="form-control" id="reg-pass" name="password" placeholder="Min. 8 characters" required data-min="8">
            <button type="button" class="pass-toggle">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <div class="pass-toggle-wrap">
            <input type="password" class="form-control" id="reg-confirm" name="confirm" placeholder="Repeat password" required>
            <button type="button" class="pass-toggle">👁</button>
          </div>
        </div>
        <label class="form-check"><input type="checkbox" required> I agree to the <a href="#" style="color:var(--accent);">Terms & Conditions</a></label>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Create Account</button>
      </form>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div>
        <div class="footer-logo">Nova<span>Cart</span>X</div>
        <p class="footer-desc">The future of online shopping.</p>
        <div class="footer-social">
          <a href="#" class="social-btn">𝕏</a><a href="#" class="social-btn">📸</a><a href="#" class="social-btn">𝑓</a>
        </div>
      </div>
      <div class="footer-col"><h4>Shop</h4><ul><li><a href="products.html">All Products</a></li></ul></div>
      <div class="footer-col"><h4>Account</h4><ul><li><a href="login.html">Login</a></li><li><a href="cart.html">Cart</a></li></ul></div>
      <div class="footer-col"><h4>Help</h4><ul><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>© 2025 NovaCartX.</span></div>
  </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
